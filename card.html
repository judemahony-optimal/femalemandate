<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Female Mandate Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #D1000A; --white: #ffffff; --dark: #1a1a1a; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', Georgia, serif; }

  .card { display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .card.square { width: 1080px; height: 1080px; padding: 96px 92px 80px; }
  .card.reel   { width: 1080px; height: 1920px; padding: 120px 100px 100px; }

  .theme-white { background: #ffffff; }
  .theme-red   { background: #D1000A; }

  .bg-xx { position: absolute; bottom: -40px; right: -40px; opacity: 0.04; pointer-events: none; }

  .card-header { display: flex; align-items: center; gap: 20px; z-index: 1; }
  .wordmark { font-family: 'Cormorant SC', serif; font-weight: 600; letter-spacing: 0.22em; }
  .card.square .wordmark { font-size: 22px; }
  .card.reel   .wordmark { font-size: 28px; }
  .c-red   { color: #D1000A; }
  .c-white { color: #ffffff; }

  .card-body { z-index: 1; }

  .open-quote { font-family: 'Cormorant Garamond', serif; line-height: 0.8; margin-bottom: 16px; }
  .card.square .open-quote { font-size: 220px; }
  .card.reel   .open-quote { font-size: 280px; }
  .oq-red   { color: #D1000A; opacity: 0.18; }
  .oq-white { color: #ffffff; opacity: 0.18; }

  .quote-text { font-family: 'Cormorant Garamond', serif; font-style: italic; line-height: 1.5; }
  .card.square .quote-text { font-size: 52px; }
  .card.reel   .quote-text { font-size: 64px; }
  .qt-dark  { color: #1a1a1a; }
  .qt-white { color: #ffffff; }

  .stat-number { font-family: 'Cormorant Garamond', serif; font-weight: 600; line-height: 1; }
  .card.square .stat-number { font-size: 220px; }
  .card.reel   .stat-number { font-size: 260px; }
  .sn-white { color: #ffffff; }
  .sn-red   { color: #D1000A; }

  .stat-text { font-family: 'Cormorant Garamond', serif; line-height: 1.45; margin-top: 32px; }
  .card.square .stat-text { font-size: 46px; }
  .card.reel   .stat-text { font-size: 56px; }
  .st-white { color: rgba(255,255,255,0.9); }
  .st-dark  { color: #1a1a1a; }

  .stat-source { font-family: 'Cormorant SC', serif; letter-spacing: 0.08em; margin-top: 32px; }
  .card.square .stat-source { font-size: 22px; }
  .card.reel   .stat-source { font-size: 28px; }
  .ss-white { color: rgba(255,255,255,0.3); }
  .ss-dark  { color: #bbb; }

  .card-footer { z-index: 1; }

  .rule { height: 3px; margin-bottom: 24px; }
  .card.square .rule { width: 80px; }
  .card.reel   .rule { width: 100px; }
  .rule-red   { background: #D1000A; }
  .rule-white { background: #ffffff; }

  .attribution { font-family: 'Cormorant SC', serif; letter-spacing: 0.08em; }
  .card.square .attribution { font-size: 26px; }
  .card.reel   .attribution { font-size: 32px; }
  .at-dark  { color: #888; }
  .at-white { color: rgba(255,255,255,0.55); }

  .site-url { font-family: 'Cormorant SC', serif; letter-spacing: 0.12em; display: block; margin-top: 16px; }
  .card.square .site-url { font-size: 18px; }
  .card.reel   .site-url { font-size: 22px; }
  .su-red   { color: #D1000A; opacity: 0.35; }
  .su-white { color: #ffffff; opacity: 0.25; }

  .tagline { font-family: 'Cormorant SC', serif; letter-spacing: 0.22em; }
  .card.square .tagline { font-size: 18px; }
  .card.reel   .tagline { font-size: 22px; }
  .tl-white { color: rgba(255,255,255,0.3); }
  .tl-red   { color: rgba(209,0,10,0.3); }
</style>
</head>
<body>
<div id="card"></div>
<script>
  function p(name) {
    return decodeURIComponent(new URLSearchParams(window.location.search).get(name) || '');
  }

  const type   = p('type')   || 'quote';
  const format = p('format') || 'square';
  const theme  = p('theme')  || 'red-on-white';
  const isRed  = theme === 'white-on-red';

  const mc = isRed ? '#ffffff' : '#D1000A';

  const xxBg = `<svg width="800" height="600" viewBox="0 0 36 27" fill="none" class="bg-xx">
    <path d="M2 2L15 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M15 2L2 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M21 2L34 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M34 2L21 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M12 2L24 25" stroke="${mc}" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </svg>`;

  const xxMk = `<svg width="72" height="54" viewBox="0 0 36 27" fill="none">
    <path d="M2 2L15 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M15 2L2 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M21 2L34 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M34 2L21 25" stroke="${mc}" stroke-width="4" stroke-linecap="round"/>
    <path d="M12 2L24 25" stroke="${mc}" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </svg>`;

  const bgC  = isRed ? 'theme-red'   : 'theme-white';
  const wdC  = isRed ? 'c-white'     : 'c-red';
  const oqC  = isRed ? 'oq-white'    : 'oq-red';
  const qtC  = isRed ? 'qt-white'    : 'qt-dark';
  const rlC  = isRed ? 'rule-white'  : 'rule-red';
  const atC  = isRed ? 'at-white'    : 'at-dark';
  const suC  = isRed ? 'su-white'    : 'su-red';
  const tlC  = isRed ? 'tl-white'    : 'tl-red';
  const snC  = isRed ? 'sn-white'    : 'sn-red';
  const stC  = isRed ? 'st-white'    : 'st-dark';
  const ssC  = isRed ? 'ss-white'    : 'ss-dark';

  let body = '', footer = '';

  if (type === 'quote') {
    body = `<div class="card-body">
      <div class="open-quote ${oqC}">"</div>
      <p class="quote-text ${qtC}">${p('quote')}</p>
    </div>`;
    footer = `<div class="card-footer">
      <div class="rule ${rlC}"></div>
      <p class="attribution ${atC}">— ${p('attr')}</p>
      <span class="site-url ${suC}">femalemandate.com</span>
    </div>`;
  } else {
    body = `<div class="card-body">
      <p class="stat-number ${snC}">${p('stat')}</p>
      <p class="stat-text ${stC}">${p('desc')}</p>
      <p class="stat-source ${ssC}">${p('source')}</p>
    </div>`;
    footer = `<div class="card-footer">
      <p class="tagline ${tlC}">feminism is for everyone</p>
    </div>`;
  }

  document.getElementById('card').innerHTML = `
    <div class="card ${format} ${bgC}">
      ${xxBg}
      <div class="card-header">${xxMk}<span class="wordmark ${wdC}">FEMALE MANDATE</span></div>
      ${body}
      ${footer}
    </div>`;
</script>
</body>
</html>
